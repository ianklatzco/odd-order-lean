name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  pages: write # Write access to GitHub Pages
  id-token: write # Write access to ID tokens

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Check sorry budget
        run: |
          count=$(bash scripts/count_sorries.sh)
          budget=$(cat .sorry-budget)
          echo "sorry count: $count (budget: $budget)"
          if [ "$count" -gt "$budget" ]; then
            echo "::error::sorry count ($count) exceeds budget ($budget) — see .sorry-budget"
            exit 1
          fi
      - uses: leanprover/lean-action@v1
      - uses: leanprover-community/docgen-action@v1
