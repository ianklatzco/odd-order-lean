name: Lean Action CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Docs generation lives in docs.yml (manual/weekly) — it is far too slow to
# run per push. This workflow is the fast gate: sorry budget + build.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Check sorry budget
        run: |
          count=$(bash scripts/count_sorries.sh)
          budget=$(cat .sorry-budget)
          echo "sorry count: $count (budget: $budget)"
          if [ "$count" -gt "$budget" ]; then
            echo "::error::sorry count ($count) exceeds budget ($budget) — see .sorry-budget"
            exit 1
          fi
      - uses: leanprover/lean-action@v1
